<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="atom" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#9aa0a6"/>
      <stop offset="70%" stop-color="#61666c"/>
      <stop offset="100%" stop-color="#454a50"/>
    </radialGradient>
    <linearGradient id="bond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f6f7"/>
      <stop offset="100%" stop-color="#d8dbde"/>
