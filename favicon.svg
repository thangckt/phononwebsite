  </defs>

  <rect width="64" height="64" rx="12" fill="#0aa4d6"/>

  <!-- Pure hexagonal ring -->
  <g stroke="url(#bond)" stroke-width="4" stroke-linecap="round" opacity="0.98">
    <line x1="32" y1="12" x2="45" y2="20"/>
    <line x1="45" y1="20" x2="45" y2="36"/>
    <line x1="45" y1="36" x2="32" y2="44"/>
    <line x1="32" y1="44" x2="19" y2="36"/>
    <line x1="19" y1="36" x2="19" y2="20"/>
    <line x1="19" y1="20" x2="32" y2="12"/>
  </g>

  <g fill="url(#atom)">
    <circle cx="32" cy="12" r="6.0"/>
    <circle cx="45" cy="20" r="6.0"/>
    <circle cx="45" cy="36" r="6.0"/>
    <circle cx="32" cy="44" r="6.0"/>
    <circle cx="19" cy="36" r="6.0"/>
    <circle cx="19" cy="20" r="6.0"/>
